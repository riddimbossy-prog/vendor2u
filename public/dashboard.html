<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Vendor2U</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: {
            navy:  { DEFAULT: '#02244F', 700: '#062F63', 900: '#02132B' },
            brand: { DEFAULT: '#FC700E', 600: '#FC700E', 700: '#E25E00', 50: '#FFF3E9' }
        }}}};
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .heading-font { font-family: 'Playfair Display', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    <nav class="bg-navy text-white">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2.5">
                <div class="w-9 h-9 bg-white rounded-lg flex items-center justify-center text-base font-extrabold tracking-tight text-navy">V<span class="text-brand">2</span>U</div>
                <span class="text-xl font-bold">Vendor<span class="text-brand">2</span>U</span>
            </a>
            <div class="flex items-center gap-4 text-sm">
                <a href="/" class="text-gray-300 hover:text-white">View site</a>
                <button onclick="logout()" class="text-gray-300 hover:text-white">Log out</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-10">
        <div id="loading" class="text-center text-gray-400 py-20">Loading your dashboard…</div>

        <div id="dash" class="hidden">
            <!-- Header -->
            <div class="flex items-start justify-between gap-4 mb-8">
                <div>
                    <h1 id="biz-name" class="text-3xl font-bold heading-font"></h1>
                    <p id="biz-sub" class="text-gray-500 mt-1"></p>
                </div>
                <button onclick="openProfile()" class="px-4 py-2 border border-gray-300 rounded-xl text-sm font-medium hover:bg-white">Edit profile</button>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-4 gap-4 mb-8">
                <div class="bg-white rounded-2xl border border-gray-100 p-5"><div class="text-3xl font-bold text-navy" id="s-total">0</div><div class="text-sm text-gray-500 mt-1">Total</div></div>
                <div class="bg-white rounded-2xl border border-gray-100 p-5"><div class="text-3xl font-bold text-brand" id="s-new">0</div><div class="text-sm text-gray-500 mt-1">New</div></div>
                <div class="bg-white rounded-2xl border border-gray-100 p-5"><div class="text-3xl font-bold text-green-600" id="s-booked">0</div><div class="text-sm text-gray-500 mt-1">Booked</div></div>
                <div class="bg-white rounded-2xl border border-gray-100 p-5"><div class="text-3xl font-bold text-gray-700" id="s-week">0</div><div class="text-sm text-gray-500 mt-1">This week</div></div>
            </div>

            <!-- Filter -->
            <div class="flex gap-2 mb-4 text-sm" id="filters"></div>

            <h2 class="text-lg font-semibold mb-4">Quote Requests</h2>
            <div id="requests"></div>
        </div>
    </main>

    <!-- Edit profile modal -->
    <div id="profile-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4" onclick="if(event.target===this)this.classList.add('hidden')">
        <div class="bg-white rounded-3xl max-w-lg w-full max-h-[90vh] overflow-y-auto p-8">
            <h2 class="text-2xl font-bold mb-6 heading-font">Edit your profile</h2>
            <form id="profile-form" onsubmit="saveProfile(event)" class="space-y-4">
                <input name="name" placeholder="Business name" class="w-full px-4 py-3 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand">
                <input name="owner" placeholder="Your name" class="w-full px-4 py-3 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand">
                <div class="grid grid-cols-2 gap-3">
                    <input name="city" placeholder="City" class="px-4 py-3 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand">
                    <input name="state" placeholder="State" maxlength="2" class="px-4 py-3 border rounded-2xl uppercase focus:outline-none focus:ring-2 focus:ring-brand">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input name="priceMin" type="number" placeholder="Starting price ($)" class="px-4 py-3 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand">
                    <input name="priceUnit" placeholder="per event / per person" class="px-4 py-3 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand">
                </div>
                <input name="cultural" placeholder="Cultures served (comma separated)" class="w-full px-4 py-3 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand">
                <textarea name="bio" rows="3" placeholder="Describe your services…" class="w-full px-4 py-3 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand"></textarea>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 py-3 bg-brand hover:bg-brand-700 text-white rounded-2xl font-semibold">Save</button>
                    <button type="button" onclick="$('profile-modal').classList.add('hidden')" class="px-6 py-3 border border-gray-300 rounded-2xl">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="hidden fixed bottom-6 right-6 bg-gray-900 text-white px-6 py-4 rounded-2xl shadow-2xl z-50"></div>

    <script>
    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    let ME = null, ALL = [], FILTER = 'all';

    function toast(m) { const t=$('toast'); t.textContent=m; t.classList.remove('hidden'); clearTimeout(window._t); window._t=setTimeout(()=>t.classList.add('hidden'),3000); }
    function timeAgo(iso) {
        if (!iso) return '';
        const then = new Date(iso);
        const d = (Date.now() - then.getTime())/1000;
        if (isNaN(d)) return '';
        if (d < 3600) return Math.max(1,Math.round(d/60))+' min ago';
        if (d < 86400) return Math.round(d/3600)+' hr ago';
        return Math.round(d/86400)+' day(s) ago';
    }

    async function init() {
        // Must be logged in
        const me = await (await fetch('/api/auth/me')).json();
        if (!me.loggedIn) { window.location.href = '/login'; return; }
        ME = me.vendor;
        $('loading').classList.add('hidden');
        $('dash').classList.remove('hidden');
        $('biz-name').textContent = ME.name;
        $('biz-sub').textContent = ME.category + ' • ' + (ME.location.city || '') + (ME.location.state ? ', ' + ME.location.state : '');
        await loadBookings();
    }

    async function loadBookings() {
        try {
            ALL = await (await fetch('/api/my/bookings')).json();
        } catch (e) { ALL = []; }
        renderStats();
        renderFilters();
        renderList();
    }

    function renderStats() {
        $('s-total').textContent = ALL.length;
        $('s-new').textContent = ALL.filter(b => b.status === 'new').length;
        $('s-booked').textContent = ALL.filter(b => b.status === 'booked').length;
        const weekAgo = Date.now() - 7*86400*1000;
        $('s-week').textContent = ALL.filter(b => new Date(b.createdAt).getTime() > weekAgo).length;
    }

    function renderFilters() {
        const counts = { all: ALL.length, new: 0, replied: 0, booked: 0, declined: 0 };
        ALL.forEach(b => counts[b.status] = (counts[b.status]||0)+1);
        const labels = { all:'All', new:'New', replied:'Replied', booked:'Booked', declined:'Declined' };
        $('filters').innerHTML = Object.keys(labels).map(k =>
            `<button onclick="setFilter('${k}')" class="px-4 py-2 rounded-xl font-medium ${FILTER===k?'bg-navy text-white':'bg-white border border-gray-200 text-gray-600'}">${labels[k]} <span class="opacity-60">${counts[k]||0}</span></button>`
        ).join('');
    }
    function setFilter(f) { FILTER = f; renderFilters(); renderList(); }

    function renderList() {
        const list = FILTER === 'all' ? ALL : ALL.filter(b => b.status === FILTER);
        if (!list.length) {
            $('requests').innerHTML = '<div class="bg-white rounded-2xl border border-gray-100 p-12 text-center"><div class="text-5xl mb-4">📭</div><h3 class="text-xl font-semibold">Nothing here yet</h3><p class="text-gray-500 mt-2">Quote requests from customers will appear here.</p></div>';
            return;
        }
        $('requests').innerHTML = list.map(card).join('');
    }

    function statusBadge(s) {
        const map = { new:'bg-brand-50 text-brand-700', replied:'bg-blue-50 text-blue-700', booked:'bg-green-50 text-green-700', declined:'bg-gray-100 text-gray-500' };
        return `<span class="text-xs px-2 py-0.5 rounded-lg font-medium ${map[s]||''}">${s}</span>`;
    }

    function card(b) {
        return `
        <div class="bg-white rounded-2xl border border-gray-100 p-6 mb-4">
            <div class="flex justify-between items-start gap-4">
                <div>
                    <div class="flex items-center gap-2">
                        <span class="font-semibold text-lg">${esc(b.customerName) || 'Customer'}</span>
                        ${statusBadge(b.status)}
                    </div>
                    <div class="text-sm text-gray-500 mt-0.5">${timeAgo(b.createdAt)}</div>
                </div>
                <div class="text-right text-sm">
                    ${b.eventType ? '<div class="font-medium">'+esc(b.eventType)+'</div>' : ''}
                    ${b.eventDate ? '<div class="text-gray-500">'+esc(b.eventDate)+'</div>' : ''}
                </div>
            </div>
            ${b.message ? '<p class="mt-4 text-gray-700 bg-gray-50 rounded-xl p-4">'+esc(b.message)+'</p>' : ''}
            <div class="mt-4 flex flex-wrap items-center gap-3 text-sm">
                ${b.customerEmail ? `<a href="mailto:${esc(b.customerEmail)}" class="inline-flex items-center gap-2 px-4 py-2 bg-brand hover:bg-brand-700 text-white rounded-xl font-medium"><i class="fa-solid fa-envelope"></i> Reply</a>` : ''}
                ${b.customerEmail ? '<span class="text-gray-500">'+esc(b.customerEmail)+'</span>' : ''}
                <span class="ml-auto flex items-center gap-1">
                    <span class="text-gray-400 mr-1">Mark:</span>
                    ${['new','replied','booked','declined'].map(s =>
                        `<button onclick="setStatus('${b.id}','${s}')" class="px-2.5 py-1 rounded-lg ${b.status===s?'bg-navy text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}">${s}</button>`
                    ).join('')}
                </span>
            </div>
        </div>`;
    }

    async function setStatus(id, status) {
        try {
            const res = await fetch('/api/my/bookings/'+id+'/status', {
                method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ status })
            });
            if (!res.ok) throw new Error();
            const b = ALL.find(x => x.id === id); if (b) b.status = status;
            renderStats(); renderFilters(); renderList();
            toast('Updated to "' + status + '"');
        } catch (e) { toast('Could not update'); }
    }

    function openProfile() {
        const f = $('profile-form');
        f.name.value = ME.name || '';
        f.owner.value = ME.owner || '';
        f.city.value = ME.location.city || '';
        f.state.value = ME.location.state || '';
        f.priceMin.value = ME.priceRange.min || '';
        f.priceUnit.value = ME.priceRange.unit || '';
        f.cultural.value = (ME.culturalSpecialties || []).join(', ');
        f.bio.value = ME.bio || '';
        $('profile-modal').classList.remove('hidden');
    }

    async function saveProfile(e) {
        e.preventDefault();
        const f = e.target;
        const payload = {
            name: f.name.value, owner: f.owner.value, city: f.city.value, state: f.state.value,
            priceMin: Number(f.priceMin.value) || 0, priceUnit: f.priceUnit.value,
            culturalSpecialties: f.cultural.value.split(',').map(s => s.trim()).filter(Boolean),
            bio: f.bio.value
        };
        try {
            const res = await fetch('/api/vendors/me', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            const data = await res.json();
            if (!res.ok) throw new Error();
            ME = data.vendor;
            $('biz-name').textContent = ME.name;
            $('biz-sub').textContent = ME.category + ' • ' + (ME.location.city||'') + (ME.location.state ? ', '+ME.location.state : '');
            $('profile-modal').classList.add('hidden');
            toast('Profile saved');
        } catch (e) { toast('Could not save'); }
    }

    async function logout() {
        await fetch('/api/auth/logout', { method: 'POST' });
        window.location.href = '/';
    }

    window.onload = init;
    </script>
</body>
</html>
