<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Login - Vendor2U</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: {
            navy:  { DEFAULT: '#02244F', 700: '#062F63', 900: '#02132B' },
            brand: { DEFAULT: '#FC700E', 600: '#FC700E', 700: '#E25E00', 50: '#FFF3E9' }
        }}}};
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .heading-font { font-family: 'Playfair Display', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav class="bg-navy text-white">
        <div class="max-w-5xl mx-auto px-6 py-4">
            <a href="/" class="flex items-center gap-2.5 w-max">
                <div class="w-9 h-9 bg-white rounded-lg flex items-center justify-center text-base font-extrabold tracking-tight text-navy">V<span class="text-brand">2</span>U</div>
                <span class="text-xl font-bold">Vendor<span class="text-brand">2</span>U</span>
            </a>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center px-6 py-12">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8">
                <!-- Tabs -->
                <div class="flex gap-2 mb-8 bg-gray-100 rounded-2xl p-1">
                    <button id="tab-login" onclick="showTab('login')" class="flex-1 py-2.5 rounded-xl text-sm font-semibold bg-white shadow-sm">Log in</button>
                    <button id="tab-signup" onclick="showTab('signup')" class="flex-1 py-2.5 rounded-xl text-sm font-semibold text-gray-500">Sign up</button>
                </div>

                <!-- LOGIN -->
                <form id="form-login" onsubmit="doLogin(event)" class="space-y-4">
                    <h1 class="text-2xl font-bold heading-font">Welcome back</h1>
                    <input required type="email" name="email" placeholder="Email" class="w-full px-4 py-3 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand">
                    <input required type="password" name="password" placeholder="Password" class="w-full px-4 py-3 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand">
                    <button type="submit" class="w-full py-3.5 bg-brand hover:bg-brand-700 text-white rounded-2xl font-semibold">Log in</button>
                </form>

                <!-- SIGNUP -->
                <form id="form-signup" onsubmit="doSignup(event)" class="space-y-4 hidden">
                    <h1 class="text-2xl font-bold heading-font">List your business</h1>
                    <input required name="name" placeholder="Business name" class="w-full px-4 py-3 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand">
                    <input name="owner" placeholder="Your name" class="w-full px-4 py-3 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand">
                    <select required name="category" class="w-full px-4 py-3 border rounded-2xl text-gray-700 focus:outline-none focus:ring-2 focus:ring-brand">
                        <option value="">Select a category</option>
                        <option>Catering</option><option>Photography</option><option>DJ</option>
                        <option>Decor</option><option>Makeup</option><option>Fashion</option>
                    </select>
                    <div class="grid grid-cols-2 gap-3">
                        <input name="city" placeholder="City" class="px-4 py-3 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand">
                        <input name="state" placeholder="State" maxlength="2" class="px-4 py-3 border rounded-2xl uppercase focus:outline-none focus:ring-2 focus:ring-brand">
                    </div>
                    <input required type="email" name="email" placeholder="Email" class="w-full px-4 py-3 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand">
                    <input required type="password" name="password" placeholder="Password (min 6 characters)" class="w-full px-4 py-3 border rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand">
                    <button type="submit" class="w-full py-3.5 bg-brand hover:bg-brand-700 text-white rounded-2xl font-semibold">Create account</button>
                </form>

                <p id="msg" class="hidden mt-4 text-sm text-center"></p>
            </div>
        </div>
    </main>

    <script>
    const $ = (id) => document.getElementById(id);

    function showTab(which) {
        const login = which === 'login';
        $('form-login').classList.toggle('hidden', !login);
        $('form-signup').classList.toggle('hidden', login);
        $('tab-login').className = 'flex-1 py-2.5 rounded-xl text-sm font-semibold ' + (login ? 'bg-white shadow-sm' : 'text-gray-500');
        $('tab-signup').className = 'flex-1 py-2.5 rounded-xl text-sm font-semibold ' + (!login ? 'bg-white shadow-sm' : 'text-gray-500');
        $('msg').classList.add('hidden');
    }

    function showMsg(text, isError) {
        const m = $('msg');
        m.textContent = text;
        m.className = 'mt-4 text-sm text-center ' + (isError ? 'text-red-600' : 'text-green-600');
        m.classList.remove('hidden');
    }

    async function doLogin(e) {
        e.preventDefault();
        const f = e.target;
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: f.email.value, password: f.password.value })
            });
            const data = await res.json();
            if (!res.ok) return showMsg(data.error || 'Login failed', true);
            window.location.href = '/dashboard';
        } catch (err) { showMsg('Could not connect. Try again.', true); }
    }

    async function doSignup(e) {
        e.preventDefault();
        const f = e.target;
        const payload = {
            name: f.name.value, owner: f.owner.value, category: f.category.value,
            city: f.city.value, state: f.state.value, email: f.email.value, password: f.password.value
        };
        try {
            const res = await fetch('/api/auth/signup', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (!res.ok) return showMsg(data.error || 'Sign up failed', true);
            window.location.href = '/dashboard';
        } catch (err) { showMsg('Could not connect. Try again.', true); }
    }

    // If already logged in, go straight to dashboard
    fetch('/api/auth/me').then(r => r.json()).then(d => { if (d.loggedIn) window.location.href = '/dashboard'; });
    </script>
</body>
</html>
